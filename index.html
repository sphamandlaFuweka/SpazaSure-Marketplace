<div class="nav-item" onclick="showPage('verify')"><i class="fas fa-shield-check"></i>Verify</div>

<section id="verifyPage" style="display:none; padding: 20px;">
    <div style="text-align:center; margin-bottom: 25px;">
        <i class="fas fa-certificate fa-3x" style="color: var(--secondary);"></i>
        <h2 style="margin-top:10px;">Product Verification</h2>
        <p style="color: var(--gray-600); font-size: 0.9rem;">Scan or enter the SpazaSure ID on your packaging.</p>
    </div>

    <div class="search-box" style="background: var(--gray-100); color: var(--dark); border: 1px solid var(--gray-200);">
        <i class="fas fa-barcode"></i>
        <input type="text" id="verifyInput" placeholder="Enter Serial Number (e.g. SZ-2026-001)">
        <button onclick="verifyProduct()" style="background: var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px;">Check</button>
    </div>

    <div id="verifyResult" style="margin-top: 20px; display:none;">
        </div>
</section>

<script>
    // Verification Logic
    const validSerials = {
        "SZ-2026-001": { name: "Ace Super Maize 10kg", batch: "B-992", origin: "Durban Mill", status: "Verified Genuine" },
        "SZ-2026-005": { name: "Selati Sugar 10kg", batch: "S-104", origin: "Nkwaleni Valley", status: "Verified Genuine" }
    };

    function verifyProduct() {
        const id = document.getElementById('verifyInput').value;
        const resultDiv = document.getElementById('verifyResult');
        const data = validSerials[id];

        if (data) {
            resultDiv.innerHTML = `
                <div style="background: #ecfdf5; border: 1px solid var(--secondary); padding: 15px; border-radius: 12px;">
                    <div style="color: var(--secondary); font-weight: 800; margin-bottom: 10px;">
                        <i class="fas fa-check-circle"></i> ${data.status}
                    </div>
                    <div style="font-size: 0.85rem;">
                        <p><strong>Product:</strong> ${data.name}</p>
                        <p><strong>Batch:</strong> ${data.batch}</p>
                        <p><strong>Origin:</strong> ${data.origin}</p>
                    </div>
                </div>`;
        } else {
            resultDiv.innerHTML = `<div style="color: var(--danger); text-align:center;">Invalid Code. Please contact SpazaSure support.</div>`;
        }
        resultDiv.style.display = 'block';
    }
</script>
